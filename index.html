<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Lab // Lyra's Learning Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04060f; --ink:#eaf2ff; --muted:#8fa0c8;
    --amber:#ffb13b; --lilac:#cc88ff; --lav:#c8a2ff; --st:#ff1f3d;
    --sci:#2de2ff; --eng:#ff7ad9; --maths:#46e6a0;
    --panel:rgba(16,22,46,.72); --line:rgba(122,140,210,.28);
    --disp:'Orbitron',sans-serif; --ui:'Rajdhani',sans-serif; --body:'Exo 2',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.6;overflow-x:hidden;min-height:100vh}
  canvas#stars{position:fixed;inset:0;z-index:0;display:block}
  .cursor{position:fixed;width:26px;height:26px;border-radius:50%;pointer-events:none;z-index:99;background:radial-gradient(circle,rgba(200,162,255,.55),transparent 70%);transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:screen}
  .wrap{position:relative;z-index:2;max-width:1000px;margin:0 auto;padding:52px 20px 90px}
  header{text-align:center;margin-bottom:8px}
  .kicker{font-family:var(--ui);text-transform:uppercase;letter-spacing:.42em;font-size:.82rem;color:var(--amber);margin-bottom:16px}
  h1{font-family:var(--disp);font-weight:900;font-size:clamp(2.6rem,9vw,5.4rem);line-height:.93;margin:0;color:#fff;text-shadow:0 0 18px var(--st),0 0 46px rgba(255,31,61,.45);animation:flicker 7s infinite}
  h1 .lav{color:var(--lav);text-shadow:0 0 18px var(--lav),0 0 46px rgba(200,162,255,.5)}
  @keyframes flicker{0%,18%,20%,22%,80%,100%{opacity:1}19%,21%{opacity:.7}}
  .sub{color:var(--muted);max-width:540px;margin:18px auto 0;font-size:1.08rem}
  .prompt{font-family:var(--ui);text-transform:uppercase;letter-spacing:.3em;font-size:.78rem;color:var(--muted);text-align:center;margin:40px 0 16px}
  .decks{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:720px){.decks{grid-template-columns:1fr}}
  .deck{position:relative;display:block;text-decoration:none;color:inherit;background:var(--panel);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:18px;padding:30px 22px;text-align:center;transition:.22s;opacity:0;transform:translateY(24px)}
  .deck.in{opacity:1;transform:none}
  .deck .ic{font-size:3rem;display:block;margin-bottom:6px}
  .deck h2{font-family:var(--disp);font-size:1.25rem;margin:.3em 0 .15em;letter-spacing:.04em}
  .deck .count{font-family:var(--ui);font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
  .deck .go{font-family:var(--ui);margin-top:16px;font-size:.82rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .deck.sci{cursor:pointer}
  .deck.sci h2{color:var(--sci)} .deck.sci .go{color:var(--lav)}
  .deck.sci:hover{transform:translateY(-5px);border-color:var(--sci);box-shadow:0 16px 40px rgba(45,226,255,.2)}
  .deck.eng h2{color:var(--eng)} .deck.maths h2{color:var(--maths)}
  .deck.locked{opacity:.5}
  .deck.locked.in{opacity:.5}
  .deck.locked .go{color:var(--muted)}
  footer{text-align:center;color:var(--muted);font-family:var(--ui);letter-spacing:.18em;text-transform:uppercase;font-size:.74rem;margin-top:54px}
  @media (prefers-reduced-motion: reduce){*{animation:none!important}.deck{opacity:1!important;transform:none!important}.cursor{display:none}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="cursor" id="cursor"></div>
<div class="wrap">
  <header>
    <div class="kicker">Year 9 · Science Station Online</div>
    <h1>STELLAR<br><span class="lav">LAB</span></h1>
    <p class="sub">Lyra's learning hub. Interactive missions matched to your curriculum.</p>
  </header>

  <div class="prompt">▾ Select a deck ▾</div>
  <div class="decks">
    <a class="deck sci" href="science.html">
      <span class="ic">🔬</span>
      <h2>Science</h2>
      <div class="count">4 missions ready</div>
      <div class="go">Enter deck →</div>
    </a>
    <div class="deck eng locked">
      <span class="ic">📖</span>
      <h2>English</h2>
      <div class="count">Coming soon</div>
      <div class="go">Locked</div>
    </div>
    <div class="deck maths locked">
      <span class="ic">📐</span>
      <h2>Maths</h2>
      <div class="count">Coming soon</div>
      <div class="go">Locked</div>
    </div>
  </div>

  <footer>Stellar Lab · Built for Lyra</footer>
</div>
<script>
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
(function(){const c=document.getElementById('stars'),x=c.getContext('2d');let w,h,stars=[],spores=[];
  function size(){w=c.width=innerWidth;h=c.height=innerHeight;}size();addEventListener('resize',size);
  for(let i=0;i<160;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+.2,t:Math.random()*6.28,s:Math.random()*.5+.2});
  const pal=['rgba(204,136,255,','rgba(45,226,255,','rgba(255,59,92,'];
  for(let i=0;i<28;i++)spores.push({x:Math.random(),y:Math.random(),r:Math.random()*2+1,vy:-(Math.random()*.0006+.0002),vx:(Math.random()-.5)*.0003,c:pal[i%3],a:Math.random()*.4+.2});
  function draw(t){x.clearRect(0,0,w,h);
    for(const s of stars){const tw=.5+.5*Math.sin(t*.001*s.s+s.t);x.fillStyle='rgba(220,230,255,'+(.25+tw*.6)+')';x.beginPath();x.arc(s.x*w,s.y*h,s.r,0,7);x.fill();}
    for(const p of spores){p.y+=p.vy;p.x+=p.vx;if(p.y<-.02){p.y=1.02;p.x=Math.random();}x.fillStyle=p.c+p.a+')';x.shadowBlur=8;x.shadowColor=p.c+'1)';x.beginPath();x.arc(p.x*w,p.y*h,p.r,0,7);x.fill();x.shadowBlur=0;}
    requestAnimationFrame(draw);}
  if(!reduce)requestAnimationFrame(draw);else{for(const s of stars){x.fillStyle='rgba(220,230,255,.5)';x.beginPath();x.arc(s.x*w,s.y*h,s.r,0,7);x.fill();}}
})();
if(!reduce){const cur=document.getElementById('cursor');addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});}
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');}),{threshold:.12});
document.querySelectorAll('.deck').forEach(s=>io.observe(s));
</script>
</body>
</html>
